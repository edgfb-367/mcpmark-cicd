name: Deployment Status Workflow

on:
  push:
    branches:
      - main

jobs:
  pre-deployment:
    name: pre-deployment
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.create-issue.outputs.result }}
      package_version: ${{ steps.get-version.outputs.version }}
      previous_sha: ${{ steps.get-prev-sha.outputs.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run Tests
        run: npm test

      - name: Get Package Version
        id: get-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get Previous Commit SHA
        id: get-prev-sha
        run: |
          PREV_SHA=$(git rev-parse HEAD^1)
          echo "sha=$PREV_SHA" >> $GITHUB_OUTPUT

      - name: Create Deployment Tracking Issue
        id: create-issue
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deployment Tracking - ${sha}`,
              body: `Deployment started for commit ${sha}\n\nRunning pre-deployment checks...`,
              labels: ['deployment', 'in-progress']
            });
            return issue.number;

      - name: Post Pre-deployment Comment
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = ${{ steps.create-issue.outputs.result }};
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: "Pre-deployment checks completed"
            });

  rollback-preparation:
    name: rollback-preparation
    needs: pre-deployment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Rollback Artifacts
        run: |
          mkdir -p rollback
          
          # Create rollback script
          cat << 'EOF' > rollback/rollback.sh
          #!/bin/bash
          set -e
          echo "Starting rollback procedure..."
          if [ -f "package.json" ]; then
            echo "Verifying package.json exists..."
          else
            echo "Error: package.json missing!"
            exit 1
          fi
          echo "Rollback completed successfully."
          EOF
          chmod +x rollback/rollback.sh
          
          # Backup configs
          cp package.json rollback/
          cp package-lock.json rollback/ || echo "No package-lock.json"
          
          # Create dependency verification script
          cat << 'EOF' > rollback/verify-deps.js
          const fs = require('fs');
          if (fs.existsSync('./package.json')) {
            const pkg = require('./package.json');
            console.log('Dependencies verified:', pkg.dependencies);
          } else {
            console.error('package.json not found');
            process.exit(1);
          }
          EOF
          
          # Create rollback documentation
          cat << 'EOF' > rollback/ROLLBACK.md
          # Rollback Instructions
          1. Execute rollback.sh
          2. Verify application status
          3. Check logs
          EOF

      - name: Compress Rollback Package
        id: compress
        run: |
          ARTIFACT_NAME="rollback-package-${{ github.sha }}"
          tar -czf "${ARTIFACT_NAME}.tar.gz" rollback/
          echo "artifact_name=${ARTIFACT_NAME}" >> $GITHUB_OUTPUT
          echo "artifact_path=${ARTIFACT_NAME}.tar.gz" >> $GITHUB_OUTPUT

      - name: Calculate Checksum
        id: checksum
        run: |
          CHECKSUM=$(sha256sum ${{ steps.compress.outputs.artifact_path }} | awk '{print $1}')
          echo "sha256=$CHECKSUM" >> $GITHUB_OUTPUT

      - name: Upload Rollback Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.compress.outputs.artifact_name }}
          path: ${{ steps.compress.outputs.artifact_path }}
          retention-days: 30

      - name: Post Rollback Plan
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = ${{ needs.pre-deployment.outputs.issue_number }};
            const prev_sha = "${{ needs.pre-deployment.outputs.previous_sha }}";
            const curr_sha = "${{ github.sha }}";
            const version = "${{ needs.pre-deployment.outputs.package_version }}";
            const artifact_name = "${{ steps.compress.outputs.artifact_name }}";
            const checksum = "${{ steps.checksum.outputs.sha256 }}";
            
            const body = `## 🔄 Rollback Plan Ready
            
            - Previous Commit: ${prev_sha}
            - Current Commit: ${curr_sha}
            - Package Version: ${version}
            - Artifact: ${artifact_name}
            
            ### Verification Checklist
            - [x] Executable rollback script created
            - [x] Configuration backups completed
            - [x] Dependency verification script generated
            - [x] Rollback documentation created
            - [x] Compressed rollback package ready
            
            ### Quick Rollback Command
            \`\`\`bash
            ./rollback.sh
            \`\`\`
            
            ### Status
            - Rollback script created: true
            - Configuration backup: true
            - Artifact checksum: SHA256: ${checksum}
            `;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: body
            });

  post-deployment:
    name: post-deployment
    needs: [pre-deployment, rollback-preparation]
    runs-on: ubuntu-latest
    steps:
      - name: Update Issue Status
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = ${{ needs.pre-deployment.outputs.issue_number }};
            
            // Remove in-progress label
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              name: 'in-progress'
            });
            
            // Add completed label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              labels: ['completed']
            });

      - name: Post Completion Comment
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = ${{ needs.pre-deployment.outputs.issue_number }};
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: "Deployment Completed Successfully. Rollback artifacts have been uploaded."
            });

      - name: Close Issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = ${{ needs.pre-deployment.outputs.issue_number }};
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              state: 'closed'
            });
